name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "${{ env.PYTHON_VERSION }}"}
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: |
          source $HOME/.local/bin/env
          uv pip install --system --break-system-packages -e ".[dev]"
      - name: Run ruff
        run: ruff check wavesense tests
      - name: Run mypy
        run: mypy wavesense tests --ignore-missing-imports

  tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix: {python: ["3.9", "3.10", "3.11", "3.12"]}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "${{ matrix.python }}"}
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: |
          source $HOME/.local/bin/env
          uv pip install --system --break-system-packages -e ".[dev]" pytest-cov
      - name: Run pytest with coverage
        run: pytest tests/ -v --tb=short --cov=wavesense --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python == '3.11' && github.event_name == 'push'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "${{ env.PYTHON_VERSION }}"}
      - name: Run safety
        run: pip install --user safety && safety check -r pyproject.toml --full-report || true
      - name: Run bandit
        run: pip install --user bandit && bandit -r wavesense -f json -o bandit-report.json || true
